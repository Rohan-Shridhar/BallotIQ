name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID || '<YOUR_GCP_PROJECT_ID>' }}
  GAR_LOCATION: ${{ vars.GCP_GAR_LOCATION || 'us-central1' }}
  REPOSITORY: ${{ vars.GCP_REPOSITORY || '<YOUR_ARTIFACT_REGISTRY>' }}
  SERVICE: ${{ vars.GCP_SERVICE || '<YOUR_CLOUD_RUN_SERVICE>' }}
  REGION: ${{ vars.GCP_REGION || 'us-central1' }}

jobs:
  deploy:
    name: Build, Push and Deploy to Cloud Run
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Google Auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker Client
      run: |-
        gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

    - name: Build and Push Container
      run: |-
        TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"
        docker build -t "$TAG" ballotiq
        docker push "$TAG"

    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ${{ env.SERVICE }}
        region: ${{ env.REGION }}
        image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}
        flags: '--allow-unauthenticated'
